<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,500;0,700;0,800;0,900;1,800;1,900&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#bec2ff",
                    "surface-container-highest": "#e2e2e2",
                    "surface-tint": "#a04100",
                    "on-tertiary-fixed": "#161e00",
                    "on-error-container": "#93000a",
                    "primary-container": "#ff6b00",
                    "on-secondary-fixed": "#00006e",
                    "primary-fixed-dim": "#ffb693",
                    "on-surface": "#1b1b1b",
                    "surface-container-high": "#e8e8e8",
                    "surface-container": "#eeeeee",
                    "primary-fixed": "#ffdbcc",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#293600",
                    "error": "#ba1a1a",
                    "primary": "#a04100",
                    "surface-dim": "#dadada",
                    "surface-container-lowest": "#ffffff",
                    "tertiary": "#506600",
                    "tertiary-fixed": "#c3f400",
                    "secondary": "#0001c0",
                    "surface-bright": "#f9f9f9",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#351000",
                    "on-primary-container": "#572000",
                    "secondary-fixed": "#e0e0ff",
                    "on-secondary-fixed-variant": "#0000ef",
                    "surface-variant": "#e2e2e2",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f3f3f3",
                    "surface": "#f9f9f9",
                    "outline-variant": "#e2bfb0",
                    "tertiary-container": "#83a500",
                    "tertiary-fixed-dim": "#abd600",
                    "inverse-primary": "#ffb693",
                    "outline": "#8e7164",
                    "on-surface-variant": "#5a4136",
                    "on-primary-fixed-variant": "#7a3000",
                    "on-secondary-container": "#b6baff",
                    "inverse-surface": "#303030",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f1f1f1",
                    "background": "#f9f9f9",
                    "on-tertiary-fixed-variant": "#3c4d00",
                    "secondary-container": "#080cff",
                    "on-primary": "#ffffff",
                    "on-background": "#1b1b1b"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "border-thick": "3px",
                    "lg": "40px",
                    "xs": "8px",
                    "sm": "16px",
                    "md": "24px",
                    "base": "4px",
                    "shadow-offset": "4px"
            },
            "fontFamily": {
                    "label-caps": ["Space Mono"],
                    "technical-md": ["Space Mono"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "technical-sm": ["Space Mono"],
                    "display": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "label-caps": ["11px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "technical-md": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "800"}],
                    "technical-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "900"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .neo-shadow {
            box-shadow: 8px 8px 0px 0px #1b1b1b;
        }

        .neo-shadow-sm {
            box-shadow: 4px 4px 0px 0px #1b1b1b;
        }

        @keyframes pulse-intense {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }

        .animate-status {
            animation: pulse-intense 1.5s infinite linear;
        }

        .hazard-bg {
            background: repeating-linear-gradient(
                45deg,
                #1b1b1b,
                #1b1b1b 10px,
                #ff6b00 10px,
                #ff6b00 20px
            );
        }

        body {
            background-color: #f9f9f9;
            color: #1b1b1b;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-md">
<!-- Splash Screen Canvas -->
<main class="relative w-full max-w-4xl h-[80vh] md:h-[600px] bg-background border-thick border-on-background flex flex-col items-center justify-between p-lg overflow-hidden neo-shadow">
<!-- Subtle Pattern Overlay (Visual Depth) -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#1b1b1b 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Header Utility Bar (Neo-Brutalist Frame Decor) -->
<div class="w-full flex justify-between items-start z-10">
<div class="flex gap-xs">
<div class="w-4 h-4 bg-primary border-2 border-on-background"></div>
<div class="w-4 h-4 bg-tertiary border-2 border-on-background"></div>
<div class="w-4 h-4 bg-secondary border-2 border-on-background"></div>
</div>
<div class="font-technical-sm text-technical-sm border-2 border-on-background px-2 py-1 bg-surface-container-highest">
                v.4.2.0_STABLE
            </div>
</div>
<!-- Center Brand Block -->
<div class="flex flex-col items-center justify-center text-center z-10">
<!-- Icon Shell -->
<div class="mb-md bg-tertiary-container border-thick border-on-background p-sm neo-shadow-sm rotate-[-3deg]">
<span class="material-symbols-outlined text-[64px] text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">
                    speed
                </span>
</div>
<!-- Main Title -->
<h1 class="font-display text-display italic uppercase leading-none tracking-tighter text-primary">
                TORRENT<br/>PLAYER
            </h1>
<!-- Tech Subtitle -->
<div class="mt-xs font-label-caps text-label-caps bg-on-background text-background px-md py-base uppercase">
                High Speed P2P Streaming Engine
            </div>
</div>
<!-- Bottom Loading/Status Section -->
<div class="w-full flex flex-col gap-sm z-10">
<!-- Progress Bar Container -->
<div class="w-full h-8 bg-surface-container-highest border-thick border-on-background relative overflow-hidden">
<!-- Animated Progress Fill -->
<div class="absolute top-0 left-0 h-full bg-tertiary transition-all duration-300" style="width: 65%;"></div>
<!-- Scanning Effect Overlay -->
<div class="hazard-bg absolute top-0 left-0 h-full w-full opacity-10"></div>
</div>
<!-- Status Text Footer -->
<div class="flex justify-between items-end">
<div class="flex flex-col">
<p class="font-technical-md text-technical-md text-on-background uppercase animate-status">
                        &gt; INITIALIZING_CORE_ENGINE...
                    </p>
<p class="font-technical-sm text-technical-sm opacity-60">
                        ESTABLISHING_DHT_NODE_NETWORK
                    </p>
</div>
<div class="font-technical-md text-technical-md font-bold">
                    65%
                </div>
</div>
</div>
<!-- Corner Accents (Decorative Technical Elements) -->
<div class="absolute top-0 right-0 p-2 opacity-20 pointer-events-none">
<pre class="font-technical-sm text-[10px] leading-tight">01010101
10101010
01010101
            </pre>
</div>
<div class="absolute bottom-0 left-0 p-2 opacity-20 pointer-events-none">
<pre class="font-technical-sm text-[10px] leading-tight">SEED: 242
PEER: 1.2k
            </pre>
</div>
</main>
<!-- Visual Polish: Background Shader or Canvas if available -->
<div class="fixed inset-0 -z-10 opacity-5">
<!-- Minimal noise pattern placeholder if no animation provided -->
<div class="w-full h-full" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progress = document.querySelector('.bg-tertiary');
            const percentage = document.querySelector('.font-bold');
            const statusText = document.querySelector('.animate-status');
            
            const statuses = [
                "> INITIALIZING_CORE_ENGINE...",
                "> SYNCING_DHT_PROTOCOLS...",
                "> VERIFYING_BLOCK_INTEGRITY...",
                "> ALLOCATING_BUFFER_SPACE...",
                "> HANDSHAKING_PEER_NODES..."
            ];

            let width = 65;
            let statusIndex = 0;

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    statusText.textContent = "> ENGINE_READY_STABLE";
                    statusText.classList.remove('animate-status');
                    statusText.classList.add('text-tertiary');
                    return;
                }
                
                width += Math.random() * 2;
                if (width > 100) width = 100;
                
                progress.style.width = width + '%';
                percentage.textContent = Math.floor(width) + '%';
                
                if (Math.random() > 0.8) {
                    statusIndex = (statusIndex + 1) % statuses.length;
                    statusText.textContent = statuses[statusIndex];
                }
            }, 200);
        });
    </script>
</body></html>
